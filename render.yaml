services:
  - type: web
    name: mysocial
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python mysocial/manage.py collectstatic --noinput"
    startCommand: "gunicorn mysocial.wsgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: "mysocial.settings"
