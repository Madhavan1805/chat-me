{% extends 'posts/base.html' %}

{% block title %}Password Changed!{% endblock %}

{% block content %}
<style>
    /* 🌈 Background Gradient for the whole page (similar to login) */
    body {
        background: linear-gradient(-45deg, #0d6efd, #6f42c1);
        background-size: 400% 400%;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* ✨ Card Style & Animation */
    .reset-card {
        animation: fadeInScale 0.8s ease-out forwards;
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(5px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    @keyframes fadeInScale {
        from {
            opacity: 0;
            transform: scale(0.9);
        }
        to {
            opacity: 1;
            transform: scale(1);
        }
    }

    /* 🔑 Success Icon Styling */
    .success-icon {
        font-size: 3.5rem;
        color: #20c997; /* Bootstrap Success Color */
        margin-bottom: 1rem;
        animation: bounceIn 1s ease-out;
    }

    @keyframes bounceIn {
        0%, 20%, 50%, 80%, 100% {
            transform: translateY(0);
        }
        40% {
            transform: translateY(-15px);
        }
        60% {
            transform: translateY(-8px);
        }
    }

    /* utton Style */
    .login-btn-custom {
        background: linear-gradient(90deg, #0d6efd, #6f42c1);
        border: none;
        transition: all 0.3s ease;
        font-weight: 600;
        padding: 0.6rem 2rem;
        border-radius: 0.5rem;
    }

    .login-btn-custom:hover {
        background: linear-gradient(90deg, #6f42c1, #0d6efd);
        transform: translateY(-2px);
    }
</style>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg p-5 mt-5 text-center reset-card">
                
                <i class="bi bi-check-circle-fill success-icon"></i>
                
                <h4 class="mb-3 text-dark fw-bold">Success! Password Updated.</h4>
                <p class="text-muted mb-4">Your password has been successfully set. You can now log in with your new credentials.</p>
                
                <a href="{% url 'login' %}" class="btn btn-primary login-btn-custom">
                    <i class="bi bi-box-arrow-in-right me-2"></i> Go to Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
