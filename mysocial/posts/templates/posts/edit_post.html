{% extends 'posts/base.html' %}

{% block title %}Edit Post | Chat Me{% endblock %}

{% block content %}
<style>
    /* 🌈 Animated gradient background */
    body {
        background: linear-gradient(-45deg, #6f42c1, #0d6efd, #20c997, #fd7e14);
        background-size: 400% 400%;
        animation: gradientShift 10s ease infinite;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* ✨ Card animation */
    .edit-card {
        animation: fadeInUp 0.9s ease;
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(8px);
        transition: all 0.3s ease;
    }

    .edit-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(40px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* 🎨 Form styling */
    .form-label {
        font-weight: 600;
        color: #0d6efd;
    }

    textarea.form-control, input[type="file"] {
        border: 2px solid #dee2e6;
        border-radius: 0.5rem;
        transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    textarea.form-control:focus, input[type="file"]:focus {
        border-color: #0d6efd;
        box-shadow: 0 0 10px rgba(13, 110, 253, 0.25);
    }

    /* 💫 Button animation */
    .save-btn {
        background: linear-gradient(90deg, #0d6efd, #6f42c1);
        border: none;
        font-weight: 600;
        transition: all 0.4s ease;
    }

    .save-btn:hover {
        background: linear-gradient(90deg, #6f42c1, #0d6efd);
        transform: scale(1.05);
        box-shadow: 0 5px 20px rgba(13, 110, 253, 0.4);
    }

    h3 {
        color: #0d6efd;
        font-weight: 700;
        letter-spacing: 0.5px;
    }
</style>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card edit-card shadow-lg p-4 mt-5">
                <h3 class="card-title text-center mb-4">
                    <i class="bi bi-pencil-square me-2"></i> Edit Your Post
                </h3>
                
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Content:</label>
                        {{ form.content }}
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Image (Optional):</label>
                        {% if post.image %}
                            <p class="small text-muted">
                                Current Image: 
                                <a href="{{ post.image.url }}" target="_blank" class="text-decoration-none">
                                    {{ post.image.name }}
                                </a>
                            </p>
                        {% endif %}
                        {{ form.image }}
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mt-4 save-btn">
                        <i class="bi bi-check-circle me-2"></i> Save Changes
                    </button>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock content %}
