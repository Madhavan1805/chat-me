{% extends 'posts/base.html' %}

{% block title %}Email Sent{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="alert alert-success text-center shadow-sm" role="alert">
            <h4 class="alert-heading">Email Sent!</h4>
            <p>We've emailed you instructions for setting your password. You should receive them shortly.</p>
            <hr>
            <p class="mb-0">Please check your spam folder if you do not receive the email.</p>
        </div>
    </div>
</div>
{% endblock %}
